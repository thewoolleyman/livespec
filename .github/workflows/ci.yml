# Per-target matrix CI. Python-code checks gate on whether the changeset
# contains any `.py` files; repo-metadata checks always run.
#
# Master pushes and merge_group events bypass the gate (they always run
# the full aggregate as the merge-queue safety net).
#
# Direct tool invocations (ruff, pyright, pytest, python3) in `run:` lines
# are forbidden by check-no-direct-tool-invocation; every step delegates
# to `just <target>`.

name: CI

# uv occasionally fails when the PyPI file CDN (files.pythonhosted.org)
# drops a wheel download mid-stream ("broken pipe"). UV_HTTP_RETRIES
# makes uv retry the fetch in-process instead of failing the job.
# Combined with the ~/.cache/uv actions/cache step (keyed on uv.lock)
# every uv-sync job uses below, an unchanged lock installs from cache
# and never contacts PyPI at all.
env:
  UV_HTTP_RETRIES: "5"
  # The plugin-currency staleness gate's severity lever (design D2,
  # plan/fleet-plugin-currency/research/design.md): the _bootstrap.py gate
  # warns on an UNDETERMINABLE currency locally, but CI fails hard on it —
  # confirmed-stale always hard-fails everywhere (livespec-c1k9.3).
  LIVESPEC_CURRENCY_GATE: "fail"

on:
  pull_request:
  push:
    branches: [master]
  merge_group:

jobs:
  setup:
    name: detect-py-changes
    runs-on: ubuntu-latest
    outputs:
      py_changed: ${{ steps.detect.outputs.py_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the base ref reachable for the PR diff below.
          fetch-depth: 0

      - name: Detect Python file changes
        id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -uo pipefail
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # Full-depth fetch (checkout already set fetch-depth: 0) — a
            # shallow `--depth=1` fetch doesn't bring in commits prior to
            # the base ref tip, so `git diff origin/${BASE_REF}...HEAD`
            # would intermittently fail with "no merge base" when the
            # local clone's history didn't reach the divergence point.
            # Keep `|| true` as a fallback: when fetch fails (auth,
            # network) we still try the diff against whatever
            # origin/${BASE_REF} ref the checkout already populated.
            git fetch origin "$BASE_REF" || true
            changeset=$(git diff --name-only "origin/${BASE_REF}...HEAD")
            if echo "$changeset" | grep -qE '\.py$'; then
              echo "py_changed=true" >> "$GITHUB_OUTPUT"
            else
              echo "py_changed=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "py_changed=true" >> "$GITHUB_OUTPUT"
          fi

      # `setup` is the change-detection GATE only — it deliberately does
      # NO uv pre-warm. Every check-python and check-metadata matrix job
      # `needs: setup`, so any work here sits on the critical path before
      # check-coverage (the long pole) can even start. The matrix jobs
      # each restore ~/.cache/uv themselves (keyed on uv.lock, with the
      # `uv-${{ runner.os }}-` prefix restore-key) and run their own
      # `uv sync`, so they are self-sufficient: on the common
      # unchanged-lock run the cache already exists from a prior run and
      # every job restores it in parallel with no PyPI fetch. A serial
      # pre-warm here would only help the first run after a lock change —
      # and even then the prefix restore-key means just the delta wheels
      # re-fetch (in parallel, with UV_HTTP_RETRIES) — which does not
      # justify taxing every run's wall-clock. See
      # livespec-dev-tooling archive/research/justcheck-performance (work-item
      # livespec-dev-tooling-7us.10).

  check-python:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-lint
          - check-format
          - check-types
          - check-complexity
          - check-imports-architecture
          - check-private-calls
          - check-global-writes
          - check-supervisor-discipline
          - check-no-raise-outside-io
          - check-no-except-outside-io
          - check-no-fmt-directives
          - check-public-api-result-typed
          - check-schema-dataclass-pairing
          - check-main-guard
          - check-wrapper-shape
          - check-keyword-only-args
          - check-match-keyword-only
          - check-no-inheritance
          - check-assert-never-exhaustiveness
          - check-newtype-domain-primitives
          - check-all-declared
          - check-no-write-direct
          - check-pbt-coverage-pure-modules
          - check-coverage
          - check-comment-no-historical-refs
          # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5:
          # canonical `just check` aggregate slugs that inspect .py source
          # but were not yet run in CI. The py_changed gate is correct for
          # these — nothing to check when a PR changes no .py.
          - check-check-mutation
          - check-file-lloc
          - check-no-lloc-soft-warnings
          - check-per-file-coverage
          - check-rop-pipeline-shape
          - check-tests-mirror-pairing
          - check-tests-no-subprocess-spawn
          # The CLI end-to-end harness consumer (mock tier) relocated to
          # the livespec-driver-claude repo together with the /livespec:*
          # skill bindings; its matrix entry moved with it. The wrapper-
          # chain real tier (e2e-real.yml) remains a separate, scheduled
          # workflow here.
    steps:
      # Per-step `if:` (not job-level) so each matrix entry still
      # reports a status check named `${{ matrix.target }}`. With
      # job-level `if:`, a skipped matrix collapses to one
      # `check-python` status, which doesn't satisfy branch
      # protection's requirement that each specific check name be
      # present.
      - name: Skip when no .py changes
        if: needs.setup.outputs.py_changed != 'true'
        run: echo "::notice::skipped ${{ matrix.target }} — no .py changes in this PR"

      - name: Checkout
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        if: needs.setup.outputs.py_changed == 'true'
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        if: needs.setup.outputs.py_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        if: needs.setup.outputs.py_changed == 'true'
        run: uv sync --all-groups

      - name: just ${{ matrix.target }}
        if: needs.setup.outputs.py_changed == 'true'
        run: just ${{ matrix.target }}

  check-metadata:
    name: ${{ matrix.target }}
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-claude-md-coverage
          - check-heading-coverage
          - check-local-memory-drift-audit
          - check-vendor-manifest
          - check-no-direct-tool-invocation
          # check-no-direct-destructive-cli greps the agent-facing trees
          # for direct destructive-default CLI invocations
          # (SPECIFICATION/non-functional-requirements.md
          # §"Destructive-default CLI wrapping") so a violation fails CI.
          - check-no-direct-destructive-cli
          # check-red-green-replay (no-arg) validates the COMMIT RANGE
          # origin/master..HEAD — every non-merge commit touching product
          # impl .py must carry EITHER the TDD-Red-*/TDD-Green-* pair
          # shape OR the TDD-Suite-Green-* green-verified shape,
          # regardless of subject prefix (livespec-dev-tooling v0.11.0
          # commit-range mode). It runs unconditionally: on zero-.py PRs
          # the range carries no product .py and trivially passes; on
          # master pushes the range is empty.
          - check-red-green-replay
          - check-behavior-scenario-link
          - check-copier-template-smoke
          - check-canonical-slugs-projection
          - check-cli-explicit-project-root
          - check-codex-no-repo-local-adapters
          - check-no-renderer-vendoring
          - check-tools
          - check-doctor-static
          - check-primary-checkout-commit-refuse-hook-installed
          # Byte-identity sibling of the commit-refuse check above: reads
          # the `neutral_hook_body_path` role key from pyproject.toml (a
          # config surface, no .py source), so it lives in the always-run
          # metadata matrix. Core declares NO neutral_hook_body_path (no
          # Driver hook body of its own), so the check no-ops here — it is
          # wired so CI provably runs the whole canonical aggregate.
          - check-no-shadow-ledger-body-identical
          # Tool-backed-check completeness meta-check. Parses the justfile
          # + workflow matrices — repo-metadata, no .py source — so it
          # lives in the always-run check-metadata matrix. Both-surfaces
          # wiring: this slug is a literal member of the `just check` array
          # (required by check-aggregate-completeness) AND of this CI
          # matrix.
          - check-tool-backed-check-completeness
          # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5:
          # canonical aggregate slugs that inspect NON-.py surfaces
          # (justfile, docs, marketplace, SKILL.md), need full history, or
          # gate CI config — so they belong in the always-run,
          # fetch-depth:0 metadata matrix, NOT the py-gated one.
          # check-check-coverage-incremental diffs origin/master...HEAD
          # (needs the base ref this matrix's fetch-depth:0 provides) and
          # spawns its own pytest, so it is self-contained here. The two
          # world-gate checks (check-master-ci-green,
          # check-branch-protection-alignment) are deliberately ABSENT:
          # livespec-dev-tooling v0.37.2 excludes them from the CI-mirror
          # requirement (they enforce at pre-push under an admin token; see
          # .ai/ci-gate-discipline.md).
          - check-agents-ai-references-resolve
          - check-aggregate-completeness
          - check-canonical-recipe-fidelity
          - check-check-coverage-incremental
          - check-check-tools
          - check-ci-matrix-completeness
          - check-comment-line-anchors
          - check-commit-pairs-source-and-test
          - check-fleet-marketplace-relative-sources
          - check-no-todo-registry
          - check-partition-completeness
          - check-plugin-resolution
          - check-skill-invocation-paths
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history for ALL matrix entries: the
          # check-red-green-replay range validation enumerates
          # origin/master..HEAD and needs origin/master plus the merge
          # base in the clone — a fetch-depth: 1 checkout would make
          # the base unresolvable and fail the check actionably (it
          # never silently passes). Cheap for this repo; harmless for
          # the other metadata entries.
          fetch-depth: 0

      # The cross-repo wiring-completeness invariant (run inside
      # check-doctor-static) walks every registered sibling repo and
      # reads its `justfile` via `git show HEAD:justfile`. In CI the
      # /data/projects/<sibling> paths from .livespec.jsonc do not
      # exist, so the check would fall through to the GitHub Path B
      # — which can be flaky / unauthenticated. Cloning siblings
      # to a fresh root and pointing the check at it via the
      # LIVESPEC_SIBLING_CLONES_ROOT env var keeps Path A active in
      # CI without committing the path into the manifest.
      - name: Clone sibling repos for cross-repo wiring check
        if: matrix.target == 'check-doctor-static'
        run: |
          mkdir -p "$RUNNER_TEMP/sibling-clones"
          for sibling in livespec-orchestrator-git-jsonl livespec-dev-tooling livespec-runtime; do
            git clone --depth 1 "https://github.com/thewoolleyman/$sibling.git" \
              "$RUNNER_TEMP/sibling-clones/$sibling"
          done

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Restore uv download cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      # The shared livespec-dev-tooling commit-refuse-hook check verifies
      # that `.git/hooks/pre-commit` and `.git/hooks/pre-push` contain the
      # canonical refuse-at-primary body. CI's actions/checkout clone does
      # NOT install the hook, so we install it here — AFTER `uv sync`, so
      # the installer module is importable — for the one matrix entry that
      # exercises the check, by REUSING the SAME from-package installer
      # `just bootstrap` / `just install-commit-refuse-hooks` use (the
      # SINGLE source of the structural body; there is no repo-tracked
      # git-hook-wrapper.sh copy any more, per convergence zs22.7.9.1).
      # Per SPECIFICATION/non-functional-requirements.md §"Primary-checkout
      # commit-refuse hook" the canonical body carries the marker
      # `# livespec commit-refuse hook`, a `git rev-parse --git-common-dir`
      # invocation, and an `exit 1` branch — the substring fingerprint the
      # check verifies. The verifier only READS the file; the hook never
      # fires in this metadata job, so its lefthook delegation is never
      # reached.
      - name: Install commit-refuse hook (satisfy invariant)
        if: matrix.target == 'check-primary-checkout-commit-refuse-hook-installed'
        run: just install-commit-refuse-hooks

      - name: just ${{ matrix.target }}
        env:
          LIVESPEC_SIBLING_CLONES_ROOT: ${{ runner.temp }}/sibling-clones
          # Arm the CI-matrix drift guard (epic livespec-cf4bcu slice 5):
          # now that this repo's matrix + ci-green are complete, flip
          # check-ci-matrix-completeness from warn (exit 0) to FAIL
          # (exit 4), so any future canonical slug wired into `just check`
          # but dropped from CI reddens this leg instead of silently
          # warning. Harmless for the other metadata legs — they do not
          # read this var.
          LIVESPEC_FAIL_IF_CI_MATRIX_GAPS_EXIST: "true"
        run: just ${{ matrix.target }}

  # Closed-loop CI telemetry: export this run's per-job timings to Honeycomb
  # (dataset github-ci) and FAIL if Honeycomb does not accept them. The run
  # that produced the data confirms its own telemetry landed — so a broken
  # pipeline can't die silently (it reddens master CI and fires the existing
  # failure notification). Master/merge_group ONLY (never PRs, so PR feedback
  # stays fast); runs even when checks fail (!cancelled) so failed runs are
  # observable too; excludes itself (still in_progress → no completedAt). See
  # SPECIFICATION/non-functional-requirements.md §"CI telemetry export".
  export-telemetry:
    name: export-telemetry
    needs: [setup, check-python, check-metadata]
    if: ${{ !cancelled() && (github.event_name == 'push' || github.event_name == 'merge_group') }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export CI run telemetry to Honeycomb (closed-loop verified)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC: ${{ secrets.HONEYCOMB_GITHUB_CI_INGEST_KEY_LIVESPEC }}
        run: bash .github/scripts/export-ci-telemetry.sh

  # fleet-ci-aggregate-coverage (epic livespec-cf4bcu) slice 5: the single
  # all-green gate job. It `needs:` every check-bearing job and fails if any
  # dependency failed or was cancelled — a pure GitHub-expression gate (no
  # external action, no direct tool invocation, so it satisfies
  # non-functional-requirements.md §"Toolchain pins"). Branch protection
  # requires ONLY this context, so one stable name gates the whole matrix and
  # never churns as checks are added. A SKIPPED dependency (e.g. the entire
  # check-python matrix on a zero-.py PR) is not a failure, so ci-green stays
  # green then. export-telemetry is push/merge_group-only and NOT a gate, so
  # it is intentionally absent from `needs:`.
  ci-green:
    name: ci-green
    needs: [check-python, check-metadata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All required checks passed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
