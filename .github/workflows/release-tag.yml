# Release-tag workflow — runs the release-gate targets on tag push.
#
# Surfaces the release-gate recipes from justfile (`check-mutation`,
# `check-no-todo-registry`, `check-no-lloc-soft-warnings`). These
# targets are NOT part of `just check` (not run per-commit); they
# fire only on tag push to gate releases.
#
# The checks now self-manage via per-check levers (epic li-cvaudit):
# they warn/skip by default so per-commit `just check` stays green,
# and this workflow's job-level `env:` block sets each lever so the
# release gate is strict. Without the levers, these targets would
# warn-and-pass (or skip) and the release gate would gate nothing.
#
#   - check-mutation: mutmut against livespec/parse/ + validate/.
#     Threshold = ratchet against .mutmut-baseline.json bounded by
#     an absolute 80% ceiling. The ratchet logic lives in the
#     recipe, NOT in pyproject.toml's [tool.mutmut]. Runs only when
#     `LIVESPEC_RUN_MUTATION` is set (set below).
#   - check-no-todo-registry: rejects any test: "TODO" entry in
#     tests/heading-coverage.json. Ensures every release ships with
#     full rule-test coverage. Fails (rather than warns) only when
#     `LIVESPEC_FAIL_IF_HEADING_COVERAGE_TODOS_EXIST` is set (below).
#   - check-no-lloc-soft-warnings: rejects any first-party .py file
#     in the 201-250 LLOC soft band. Closes the soft-band drift
#     loophole: per-commit ergonomic (warning), but tag-push
#     enforcement blocks release until clean. Fails (rather than
#     warns) only when `LIVESPEC_FAIL_IF_LLOC_SOFT_WARNINGS_EXIST`
#     is set (below).

name: Release tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release-gate:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    # Per-check levers that flip the self-managing release-gate checks
    # (epic li-cvaudit) from their per-commit warn/skip default into
    # strict release-gate enforcement. Set job-wide; each lever is read
    # only by its own check, so a target that does not consume a lever
    # is unaffected.
    env:
      LIVESPEC_RUN_MUTATION: "true"
      LIVESPEC_FAIL_IF_HEADING_COVERAGE_TODOS_EXIST: "true"
      LIVESPEC_FAIL_IF_LLOC_SOFT_WARNINGS_EXIST: "true"
    strategy:
      fail-fast: false
      matrix:
        target:
          - check-mutation
          - check-no-todo-registry
          - check-no-lloc-soft-warnings
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just ${{ matrix.target }}
        run: just ${{ matrix.target }}
