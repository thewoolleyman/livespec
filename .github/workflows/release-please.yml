# release-please.yml — semver-managed releases via Conventional Commits.
#
# Authority: SPECIFICATION/contracts.md §"Plugin versioning" — the
#   documented mechanism is release-please driven from per-commit
#   Conventional Commits via the release-please-action GitHub Action.
#   This wires that mechanism for livespec core; the sibling libraries
#   livespec-dev-tooling and livespec-runtime already run it.
#
# Behavior: on every push to master, release-please opens (or updates)
# a release PR carrying the next-version bump per the Conventional
# Commits → semver mapping (contracts.md §"Plugin versioning"):
#
#   feat:                                   → MINOR
#   fix:                                    → PATCH
#   feat!:, fix!:, BREAKING CHANGE: footer  → MAJOR
#   chore, docs, style, refactor, perf,     → no bump
#   test, build, ci, revert
#
# When the release PR merges, release-please tags vX.Y.Z and creates a
# GitHub Release. The version source of truth is the plugin manifest
# `.claude-plugin/plugin.json` `$.version` (contracts.md §"Plugin
# versioning"), bumped via the release-please-config.json `extra-files`
# JSON updater — NOT pyproject.toml: livespec core ships a Claude Code
# plugin, not a published Python package.
#
# Auth model:
#   release-please MUST authenticate via the livespec GitHub App
#   installation token (secrets APP_ID + APP_PRIVATE_KEY), NOT the
#   default `GITHUB_TOKEN`. A GitHub Release authored by
#   `github-actions[bot]` (i.e. via `GITHUB_TOKEN`) does NOT fire the
#   `release: published` event, so `release-dispatch.yml` — the entry
#   point of the cross-repo coordination automation surface — never
#   triggers and the sibling pin-bump fan-out silently never runs.
#   A Release authored via an App installation token DOES fire the
#   event, restoring the fan-out path. (Same App identity backs
#   `auto-enable-merge.yml` and the reusable fan-out workflows.)

name: Release Please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
