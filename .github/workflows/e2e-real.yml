# E2E real-claude workflow — live claude-agent-sdk against the Anthropic API.
#
# Implementation: li-949 superseded li-7c0's dormant-stub state.
# `tests/e2e/real_claude.py` is the real-tier counterpart to
# `tests/e2e/fake_claude.py`; `tests/e2e/harness.py` selects via
# `LIVESPEC_E2E_HARNESS`. The recipe defaults to the `e2e_golden`-marked
# flagship flows (test_happy_path_minimal + test_doctor_fail_then_fix) so
# each run executes both seed → propose-change → critique → revise → doctor
# → prune-history end-to-end AND the doctor-fail-then-fix cycle through the
# live SDK.
#
# Cadence (Q4): weekly cron + workflow_dispatch. NOT every master push —
# per-run cost with Haiku 4.5 is the load-bearing reason. Estimated weekly
# cost: 2 e2e_golden tests × ~6 LLM calls × ~5000 tokens/call × Haiku 4.5
# pricing (~$1/MTok input, $5/MTok output) ≈ /usr/bin/zsh.30/week on the high
# end, /usr/bin/zsh.05-0.15/week typical. Manual workflow_dispatch runs add at the
# same rate — bound runtime spend by not auto-dispatching from PRs.
#
# Auth (Q3): `ANTHROPIC_API_KEY_LIVESPEC_E2E` is required as a repo
# secret, following the per-consumer key convention: one Anthropic API key
# per consumer, named `ANTHROPIC_API_KEY_<CONSUMER>` in the livespec
# 1Password Environment (the canonical source, projected to Actions via
# `gh secret set` under with-livespec-env.sh) and in the Actions secret
# store, with the console key named after its consumer. The secret is
# mapped to the SDK's required `ANTHROPIC_API_KEY` env var only at the
# consuming step's `env:` hop below. The job fails loudly on `schedule` /
# `workflow_dispatch` runs when the secret is unset (no false-green
# silent-skip). The fork-PR carve-out is preserved by NOT triggering on
# `pull_request` — fork contributors cannot trigger this workflow.
#
# Required CLI: the SDK shells out to `@anthropic-ai/claude-code`, installed
# via npm in the "Install Claude Code CLI" step below.

name: E2E (real Claude)

on:
  schedule:
    # Monday 09:00 UTC — weekday morning so failures land before the work week.
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  e2e-real:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require ANTHROPIC_API_KEY_LIVESPEC_E2E
        env:
          ANTHROPIC_API_KEY_LIVESPEC_E2E: ${{ secrets.ANTHROPIC_API_KEY_LIVESPEC_E2E }}
        run: |
          if [ -z "${ANTHROPIC_API_KEY_LIVESPEC_E2E}" ]; then
            echo "::error::ANTHROPIC_API_KEY_LIVESPEC_E2E repo secret is required for e2e-real runs."
            echo "Set it via: gh secret set ANTHROPIC_API_KEY_LIVESPEC_E2E --repo thewoolleyman/livespec"
            exit 1
          fi
          echo "ANTHROPIC_API_KEY_LIVESPEC_E2E is set (length=${#ANTHROPIC_API_KEY_LIVESPEC_E2E})."

      - name: Setup Node.js (for claude CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version

      - name: Install pinned binaries via mise
        uses: jdx/mise-action@v2

      - name: Install Python dev deps via uv
        run: uv sync --all-groups

      - name: just e2e-test-claude-code-real
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_LIVESPEC_E2E }}
        run: just e2e-test-claude-code-real
