# lefthook.yml — git hook configuration for the livespec repo.
#
# Every `run:` field is `just <target>`; no direct tool
# invocations (enforced by check-no-direct-tool-invocation).
# Authoritative source for the surface contract:
# python-skill-script-style-requirements.md §"Enforcement suite —
# Invocation surfaces" and §"Dev tooling and task runner".
#
# pre-commit ordering: the cheap commit-pairs gate first (inspects
# staged file list; doesn't run tests), then the heavy
# `just check-pre-commit` aggregate (Red-mode-aware — skips
# check-coverage when the staged tree matches the Red commit
# shape). check-coverage is the sole pytest-running gate in the
# aggregate. Fail-fast on the cheap gate so the developer learns
# about a missing test pair without waiting for pytest.
#
# commit-msg stage: the trailer-based replay hook runs here, NOT
# at pre-commit. The hook needs the commit-message file path
# (passed as argv[1] via lefthook's {1} template) so it can write
# Red / Green trailers via `git interpret-trailers --in-place`.

pre-commit:
  commands:
    00-lint-autofix-staged:
      run: just lint-autofix-staged
    01-commit-pairs-source-and-test:
      run: just check-commit-pairs-source-and-test
    02-check-pre-commit:
      run: just check-pre-commit

commit-msg:
  commands:
    00-no-commit-on-master:
      run: |
        branch=$(git rev-parse --abbrev-ref HEAD)
        if [ "$branch" = "master" ]; then
          printf 'ERROR: direct commits to master are forbidden; create a feature branch first\n' >&2
          printf 'Hint: git checkout -b <branch-name>\n' >&2
          exit 1
        fi
    01-red-green-replay:
      run: just check-red-green-replay {1}

pre-push:
  commands:
    check:
      run: just check-pre-push
