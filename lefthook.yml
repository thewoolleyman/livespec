# lefthook.yml — git hook configuration for the livespec repo.
#
# Authoritative source: python-skill-script-style-requirements.md
# §"Enforcement suite — Invocation surfaces" and §"Dev tooling and
# task runner" — every `run:` field is `just <target>`; no direct
# tool invocations (enforced by check-no-direct-tool-invocation).
#
# Activation: per v033 D5a, lefthook is installed at the
# v033-codification + four-guardrail-script-commits boundary via
# `just bootstrap` (which executes `uv run lefthook install`).
# Pre-v033 the file existed as a stub waiting for Phase-5-exit
# activation; v033 D5a moved activation forward so the four
# mechanical guardrails (mirror-pairing, per-file 100% coverage,
# commit-pairs-source-and-test, ## Red output) gate every commit
# from the second-retroactive-redo onward.
#
# pre-commit ordering: the cheap commit-pairs gate first (inspects
# staged file list; doesn't run tests), then the heavy
# `just check-pre-commit` aggregate (per v036 D1: Red-mode-aware,
# skips check-coverage when the staged tree matches the v034 Red
# commit shape). Per v039 D1, check-coverage is the sole
# pytest-running gate (check-tests was dropped from the aggregate
# at v039 codification). Fail-fast on the cheap gate so the
# developer learns about a missing test pair without waiting for
# pytest.
#
# commit-msg stage: the v034 D3 replay hook runs here, NOT at
# pre-commit. The hook needs the commit-message file path (passed
# as argv[1] via lefthook's {1} template) so it can write Red /
# Green trailers via `git interpret-trailers --in-place`. PROPOSAL.md
# line 3517 says "pre-commit hook" loosely; the actual design is
# commit-msg. See bootstrap/decisions.md 2026-05-02T06:00:00Z for
# the architectural-choice provenance.

pre-commit:
  commands:
    00-lint-autofix-staged:
      run: just lint-autofix-staged
    01-commit-pairs-source-and-test:
      run: just check-commit-pairs-source-and-test
    02-check-pre-commit:
      run: just check-pre-commit

commit-msg:
  commands:
    01-red-green-replay:
      run: just check-red-green-replay {1}

pre-push:
  commands:
    check:
      run: just check
