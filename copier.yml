# Root copier manifest for the livespec monorepo.
#
# The impl-plugin template lives at templates/impl-plugin/. This file
# routes `copier copy gh:thewoolleyman/livespec` and
# `copier update` to that subdirectory so _src_path in generated
# repos can use the repo root URL rather than a non-standard
# `gh:owner/repo/subdir` path (which copier parses as owner/repo=
# "owner/repo/subdir" — a broken GitHub URL).
#
# _envops and _templates_suffix are set here (as well as in the
# subdirectory's copier.yml) because the root config governs Jinja2
# env setup — the subdirectory config is used only for questions.
_subdirectory: templates/impl-plugin
_templates_suffix: .jinja
_envops:
  comment_start_string: "[#"
  comment_end_string: "#]"
_exclude:
  - copier.yml
  - .git
  - __pycache__
  - "*.pyc"
  - "*.pyo"
