# Root copier manifest for the livespec monorepo.
#
# The impl-plugin template lives at templates/impl-plugin/. This file
# routes `copier copy gh:thewoolleyman/livespec` and
# `copier update --vcs-ref=master` to that subdirectory so _src_path in
# generated repos can use the repo root URL rather than a non-standard
# `gh:owner/repo/subdir` path (which copier parses as owner/repo=
# "owner/repo/subdir" — a broken GitHub URL).
#
# IMPORTANT: when the template source is the repo root (the consumer
# flow), copier reads ONLY this file — templates/impl-plugin/copier.yml
# is NOT consulted. The question set is therefore single-sourced in
# templates/impl-plugin/copier-questions.yml and !include'd both here
# and there; without it, consumer-side `copier update` would see zero
# declared questions and silently DROP every recorded answer when
# regenerating .copier-answers.yml.
#
# No `_jinja_extensions` is declared on EITHER copier config. The
# canonical enforcement-check aggregate that justfile.jinja stamps is
# delivered as committed STATIC DATA: templates/impl-plugin/
# canonical-slugs.yml is a release-time projection of
# livespec_dev_tooling.canonical_checks (regenerated via
# `just stamp-canonical-slugs` in livespec and `{% include %}`'d by
# justfile.jinja). The consumer `copier update` clones the template to
# an ephemeral checkout with no PYTHONPATH injection, so a render-time
# extension importing the dev-tooling module could never resolve here;
# the committed data file makes the canonical block render import-free
# and CORRECT on the consumer flow, so canonical-set growth propagates
# as a real reviewable diff through copier's 3-way merge (per
# SPECIFICATION/contracts.md §"Shared code sync — livespec-dev-tooling"
# → Template gate).
---
!include templates/impl-plugin/copier-questions.yml
---
_subdirectory: templates/impl-plugin
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_envops:
  comment_start_string: "[#"
  comment_end_string: "#]"
_exclude:
  - copier.yml
  - copier-questions.yml
  # canonical-slugs.yml is render-time DATA `{% include %}`'d by
  # justfile.jinja, never copied into the generated repo verbatim.
  - canonical-slugs.yml
  - .git
  - __pycache__
  - "*.pyc"
  - "*.pyo"
