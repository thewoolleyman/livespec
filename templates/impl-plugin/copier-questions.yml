# Shared question set for the impl-plugin copier template.
#
# Single source of truth for the template's questions, !include'd by
# BOTH copier entry points:
#
#   - the repo-root `copier.yml` (the consumer flow: `_src_path:
#     gh:thewoolleyman/livespec` + `_subdirectory` routing) — copier
#     reads ONLY the config at the template ROOT, so without this
#     include the consumer flow would see zero declared questions and
#     `copier update` would silently DROP every recorded answer from
#     `.copier-answers.yml` when regenerating it;
#   - `templates/impl-plugin/copier.yml` (the smoke-check flow, which
#     uses templates/impl-plugin/ itself as the template root).
#
# This file is excluded from generated output via `_exclude` in both
# configs. Do not add settings (underscore-prefixed keys) here —
# settings stay in the two copier.yml files; this file carries
# questions ONLY.

plugin_short_name:
  type: str
  help: |
    Short identifier for this implementation plugin (lowercase, hyphen-
    separated). Used to form livespec-impl-<plugin_short_name>. Examples:
    plaintext, beads, gitlab, gascity, darkfactory-kilroy.

plugin_full_name:
  type: str
  default: "livespec-impl-{{ plugin_short_name }}"
  help: |
    Full plugin name (used in marketplace.json, plugin.json, and as the
    repo name by default). Defaults to livespec-impl-<plugin_short_name>.

plugin_description:
  type: str
  help: |
    One-line description of the plugin's tracking-mechanism focus
    (e.g., "JSONL-backed implementation plugin for livespec"). Used
    for plugin.json and marketplace.json descriptions.

plugin_namespace:
  type: str
  default: "{{ plugin_full_name }}"
  help: |
    Claude Code namespace under which the plugin's slash commands are
    exposed (e.g., /<plugin_namespace>:capture-memo). Defaults to
    plugin_full_name.

author_name:
  type: str
  help: Author name to embed in plugin.json and pyproject.toml.

author_email:
  type: str
  help: Author email to embed in plugin.json and pyproject.toml.

github_owner:
  type: str
  help: GitHub owner or organization for the repo (e.g., thewoolleyman).

github_repo:
  type: str
  default: "{{ plugin_full_name }}"
  help: GitHub repository name. Defaults to plugin_full_name.

# ---------------------------------------------------------------------------
# Worktree-discipline ecosystem profile (the Worktree Discipline Pack).
#
# `ecosystem` selects the per-ecosystem HYDRATE profile for the
# worktree-discipline pack (the hydrate command below carries the profile's
# value as its DEFAULT and stays overridable). The RUNNER and the HOOK
# FRAMEWORK are NOT questions: `just` and `lefthook` are mandated
# NON-FUNCTIONALLY across all fleet + adopter repos (per the zs22 locked
# decision and the Conformance Pattern in
# research/factory-conformance/cross-repo-conformance-pattern.md) — Installer =
# a `just` recipe, commit gate wired via `lefthook → just check`. The worktree
# lifecycle is driven by the `just worktree-{create,hydrate,land,reap}` recipes
# (justfile.jinja), which call the portable core (dev-tooling/worktree-lib.sh)
# directly; the commit-refuse gate (dev-tooling/refuse-primary-commit.sh) is
# wired through lefthook (lefthook.yml.jinja). Where a repo's ecosystem has a
# native tool, the template emits a STRICT PASS-THROUGH wrapper onto `just
# worktree-*` (DERIVED from `ecosystem`: python → none; rust → cargo-xtask;
# javascript → pnpm-scripts) — never an alternative runner/framework. `just`
# and `lefthook` never enter livespec core's public functional surface or the
# `/livespec:*` skills. The portable core and the gate are pure-git and
# ECOSYSTEM-NEUTRAL; only the hydrate profile varies. Adding a 4th ecosystem
# later is a new hydrate branch — no core, gate, runner, or hook change.
#
# BACKWARD-COMPAT: `default: python` is load-bearing. Existing consumers'
# `.copier-answers.yml` predate this question; on `copier update` copier
# applies the default, so the python profile MUST reproduce the prior
# (Python-shaped) template behavior byte-for-byte. The Python-specific files
# (pyproject.toml, .python-version, the uv pin in .mise.toml) are
# conditionalized behind `ecosystem == 'python'` precisely so a python
# consumer's `copier update` is a behavioral no-op.
ecosystem:
  type: str
  default: python
  choices:
    - python
    - rust
    - javascript
  help: |
    Primary language/ecosystem of this repo. Selects the worktree-discipline
    pack's per-ecosystem hydrate command (overridable below) and the native
    pass-through wrapper, if any. The runner (`just`) and the hook framework
    (`lefthook`) are mandated across all three — they are NOT questions; the
    worktree contract, the commit-refuse gate, and the lifecycle recipes are
    identical across all three. Choose 'python' (the default) for a Python
    plugin repo, 'rust' for a cargo workspace, 'javascript' for a Node/pnpm
    workspace.

worktree_root:
  type: str
  default: "~/.worktrees/{{ github_repo }}/{{ '{{branch}}' }}"
  help: |
    Per-worktree root path convention. The portable core defaults to
    ~/.worktrees/<repo>/<branch>; this answer records the repo's chosen
    convention (the literal {{ '{{branch}}' }} placeholder is filled per
    worktree at create time). Override only if this repo deliberately roots
    its worktrees elsewhere.

land_mode:
  type: str
  default: pr
  choices:
    - pr
    - merge-queue
    - direct
  help: |
    How a landed worktree branch reaches the default branch. 'pr' (default):
    open a PR and merge it; 'merge-queue': enqueue onto a merge queue;
    'direct': push straight to the default branch. The portable core's `land`
    verb rebases then REPORTS the next step — it never auto-pushes/merges —
    so this answer documents the repo's chosen path rather than changing the
    core.

uses_mise:
  type: bool
  default: "{% if ecosystem == 'python' %}true{% else %}false{% endif %}"
  help: |
    Whether this repo manages its non-language binaries via mise (gates the
    worktree-root mise-trust step in `just bootstrap` / the equivalent
    bootstrap). Defaults true for python (the existing template behavior
    pins uv/just/lefthook via .mise.toml); false otherwise — flip to true if
    a rust or javascript repo also adopts mise for its binary pins.

hydrate_cmd:
  type: str
  default: "{% if ecosystem == 'rust' %}cargo fetch{% elif ecosystem == 'javascript' %}pnpm install --frozen-lockfile{% else %}uv sync --all-groups{% endif %}"
  help: |
    The dependency-resolution step the worktree hydrate hook runs after
    creating a fresh worktree. "Hydrate" means something DIFFERENT per
    ecosystem (python: create a .venv via the uv cache; javascript: populate
    node_modules including workspace sub-packages; rust: warm/share the BUILD
    cache — crates already live in $CARGO_HOME, so `cargo fetch` is ~free and
    the real cost is a cold target/ recompile). Defaults per ecosystem;
    override with poetry/pip/npm/yarn/etc. as needed.

python_version:
  type: str
  default: "3.13"
  when: "{{ ecosystem == 'python' }}"
  help: |
    Python version to pin via .python-version and .mise.toml. Should
    match livespec's pinned Python version for the release tag this
    template was generated against. Asked only for the python ecosystem.

livespec_release_tag:
  type: str
  help: |
    livespec release tag this template was generated against
    (e.g., v1.0.0). Used to seed the compat.pinned field in the generated
    repo's .livespec.jsonc per livespec/SPECIFICATION/contracts.md
    §"Cross-repo coordination — pin-and-bump".
