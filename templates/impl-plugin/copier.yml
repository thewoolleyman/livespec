# Canonical copier template for every livespec-impl-* plugin repository.
#
# Spec basis: livespec/SPECIFICATION/contracts.md
#   §"Shared content sync — copier template"
# Spec basis: livespec/SPECIFICATION/non-functional-requirements.md
#   §"Shared content provenance"
#   §"Project-local orchestration layer"
#
# Every livespec-impl-* repo MUST be generated from this template via:
#   copier copy gh:thewoolleyman/livespec <target> --vcs-ref=master
#
# Generated repos MUST carry a .copier-answers.yml at the repo root tracking
# the template version they were last generated from, and SHOULD re-sync via
# `copier update --vcs-ref=master` when the template changes. The
# `--vcs-ref=master` pin is load-bearing: a bare `copier update` resolves the
# latest git TAG (livespec's v1.0.0, which predates the template workflow
# set) — the family's blessed re-sync ref is master. CI in each generated
# repo SHOULD run `copier update --dry-run --vcs-ref=master` to surface
# drift.
#
# NOTE: this file is the template config ONLY when copier is pointed
# directly at templates/impl-plugin/ (the smoke-check flow). The consumer
# flow (`_src_path: gh:thewoolleyman/livespec`) reads the repo-root
# copier.yml instead, which routes here via `_subdirectory`. The question
# set is single-sourced in copier-questions.yml and !include'd by both
# configs; settings (underscore keys) are declared per-config because the
# consumer flow must NOT declare `_jinja_extensions` (the canonical-checks
# extension is only importable from a livespec checkout with dev-tooling/
# on PYTHONPATH — copier extend-merges `_jinja_extensions` across included
# documents, so it cannot be neutralized downstream).
#
# Secrets MUST NOT be templated through copier; secret material lives only in
# environment variables, OS keyring, or a secret manager.
---
!include copier-questions.yml
---
_templates_suffix: .jinja

# Override Jinja2's default comment delimiters so they don't collide
# with bash array-length syntax (`${#failed[@]}`) in justfile recipes
# and similar shell idioms. None of this template's .jinja files use
# Jinja2 comments — only variable interpolation and (rarely) block
# tags — so swapping the comment delimiters from `{#`/`#}` to
# `[#`/`#]` is a safe, localized fix.
_envops:
  comment_start_string: "[#"
  comment_end_string: "#]"

# Register the canonical-check-slug Jinja global so `justfile.jinja`
# can stamp the full enforcement-aggregate set at copy time. Per
# livespec/SPECIFICATION/contracts.md §"Shared code sync —
# livespec-dev-tooling", the slug list is derived from
# `livespec_dev_tooling.canonical_checks` (the single source of truth)
# at every `copier copy` / `copier update`, NOT from a hand-maintained
# template list. Resolution: the extension module lives at
# `dev-tooling/copier_extensions/canonical_checks.py` in livespec;
# livespec's `dev-tooling/checks/copier_template_smoke.py` injects
# `<repo-root>/dev-tooling` on PYTHONPATH when invoking the subprocess
# so the dotted path resolves.
_jinja_extensions:
  - copier_extensions.canonical_checks:CanonicalChecksExtension

_exclude:
  - copier.yml
  - copier-questions.yml
  - .git
  - __pycache__
  - "*.pyc"
  - "*.pyo"

_answers_file: .copier-answers.yml

_message_before_copy: |
  This template scaffolds a new livespec-impl-* plugin repository.

  You will be asked for the plugin's short name, description, GitHub
  coordinates, author info, Python version, and the livespec release
  tag this repo pins against. See livespec/SPECIFICATION/contracts.md
  §"Shared content sync — copier template" for the full contract.

_message_after_copy: |
  Generated. Suggested next steps:

    1. cd into the generated repo.
    2. Run `mise install && uv sync` to install the pinned toolchain.
    3. Run `just check` to verify the scaffold is green.
    4. Initialize git and push to {{ github_owner }}/{{ github_repo }}.
