3.0859 L8354.5,177.9531 L8344.5,167.9531 L7683,167.9531 L7679,106.9831 L7675,167.9531 L7003.5,167.9531 A0,0 0 0 0 7003.5,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M8344.5,167.9531 L8344.5,177.9531 L8354.5,177.9531 L8344.5,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="1330" x="7009.5" y="185.02">Tan cylinder — a collection of discrete items with lifecycle state. The four queue/archives: proposed_changes/ (pure queue), history/vNNN/ (pure archive), Work Items (queue+archive), Memos (queue+archive).</text><path d="M8390,167.9531 L8390,193.0859 A0,0 0 0 0 8390,193.0859 L9968,193.0859 A0,0 0 0 0 9968,193.0859 L9968,177.9531 L9958,167.9531 L9183,167.9531 L9179,102.7031 L9175,167.9531 L8390,167.9531 A0,0 0 0 0 8390,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M9958,167.9531 L9958,177.9531 L9968,177.9531 L9958,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="1557" x="8396" y="185.02">Pale-lavender component — an impl-side API/adapter that unifies a capability for impl-side operations. Currently: Spec Reader (presents Specification + Specification History to impl-side skills). Internals are implementation-dependent per plugin.</text><path d="M10003,167.9531 L10003,193.0859 A0,0 0 0 0 10003,193.0859 L11133,193.0859 A0,0 0 0 0 11133,193.0859 L11133,177.9531 L11123,167.9531 L10572,167.9531 L10568,102.7031 L10564,167.9531 L10003,167.9531 A0,0 0 0 0 10003,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M11123,167.9531 L11123,177.9531 L11133,177.9531 L11123,167.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength