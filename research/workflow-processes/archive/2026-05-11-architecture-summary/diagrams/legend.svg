9.0859 A0,0 0 0 0 4326,209.0859 L4798,209.0859 A0,0 0 0 0 4798,209.0859 L4798,193.9531 L4788,183.9531 L4566,183.9531 L4562,100.4831 L4558,183.9531 L4326,183.9531 A0,0 0 0 0 4326,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M4788,183.9531 L4788,193.9531 L4798,193.9531 L4788,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="451" x="4332" y="201.02">Oval — a branch point that routes based on a condition or user choice.</text><path d="M4833,183.9531 L4833,209.0859 A0,0 0 0 0 4833,209.0859 L5551,209.0859 A0,0 0 0 0 5551,209.0859 L5551,193.9531 L5541,183.9531 L5196,183.9531 L5192,103.0531 L5188,183.9531 L4833,183.9531 A0,0 0 0 0 4833,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M5541,183.9531 L5541,193.9531 L5551,193.9531 L5541,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="697" x="4839" y="201.02">Green dashed rectangle — an action taken inside a workflow (writing a file, running a check, computing a diff).</text><path d="M5586,183.9531 L5586,209.0859 A0,0 0 0 0 5586,209.0859 L6386,209.0859 A0,0 0 0 0 6386,209.0859 L6386,193.9531 L6376,183.9531 L5990,183.9531 L5986,111.2631 L5982,183.9531 L5586,183.9531 A0,0 0 0 0 5586,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><path d="M6376,183.9531 L6376,193.9531 L6386,193.9531 L6376,183.9531 " fill="#FBFB77" style="stroke: #A80036; stroke-width: 1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacingAndGlyphs" textLength="779" x="5592" y="201.02">Lavender rectangle — a structured artifact written by a workflow to the repo (e.g., .ai/&lt;topic&gt;.md, AGENTS.md reference).</text><!--MD5=[ebf4575e12e6951c64f52de14383cc9b]
@startuml legend
title Legend — Symbol Vocabulary
skinparam defaultFontName Helvetica
skinparam shadowing false
skinparam BackgroundColor white
skinparam ArrowColor #111
skinparam ArrowFontColor #111

skinparam actor {
  BorderColor #111
  BackgroundColor white
  FontColor #111
}
skinparam rectangle {
  BorderColor #111
  BackgroundColor white
  FontColor #111
}
skinparam database {
  BorderColor #111
  BackgroundColor white
  FontColor #111
}
skinparam usecase {
  BorderColor #111
  BackgroundColor white
  FontColor #111
}
skinparam card {
  BorderColor #111
  BackgroundColor white
  FontColor #111
}

actor "Human user" as HumanUser
actor "Agent\n(Claude, etc.)" as Agent #LightSkyBlue

card "Skill /\nslash command" as Skill #LightYellow
rectangle "External input\n(observation,\nuser intent,\nfailing test)" as Input #FFFFFF;line.dashed
database "Persistent\nstore" as Store
usecase "Decision\npoint" as Decision
rectangle "Action /\nside effect" as Action #LightGreen;line.dashed
rectangle "Convention /\nartifact\n(file in repo)" as Convention #Lavender

note bottom of HumanUser : Stick figure, white background — the project maintainer or contributor invoking workflows directly.
note bottom of Agent : Stick figure, light blue background — an AI agent (Claude Code, Codex CLI, etc.) acting on user's behalf. Distinguished from human by background color.
note bottom of Skill : Yellow card — a slash command exposed by livespec-core or an implementation plugin (e.g., /livespec:revise, /livespec-impl-*:capture-spec-gaps).
note bottom of Input : Dashed rectangle, white background — something outside the workflow surface that flows in (an observation, a memo's source thought, a CI failure).
note bottom of Store : Cylinder — a persistent data store (SPECIFICATION/, .beads/, repo files, work-item queue).
note bottom of Decision : Oval — a branch point that routes based on a condition or user choice.
note bottom of Action : Green dashed rectangle — an action taken inside a workflow (writing a file, running a check, computing a diff).
note bottom of Convention : Lavender rectangle — a structured artifact written by a workflow to the repo (e.g., .ai/<topic>.md, AGENTS.md reference).

@enduml

