# Livespec developer-tooling pins — non-Python binaries only.
#
# Authority: (v024) PLAN_TO_BOOTSTRAP_SPECIFICATION_AND_REPO.md Phase 1
# (initial pins). The `bd` (beads) pin was removed by the Phase D.10
# cutover when livespec-core's tracking moved to livespec-impl-plaintext;
# beads invariants in SPECIFICATION/non-functional-requirements.md
# §Contracts §"Toolchain pins" are spec-drift that will be revised in a
# follow-up propose-change cycle.
#
# Python and every Python dev package are managed by uv via
# pyproject.toml's [project.requires-python] (Python interpreter pin)
# and [dependency-groups.dev] (dev packages); uv produces a committed
# uv.lock and installs into a project-local .venv via
# `uv sync --all-groups`.
#
# `typing_extensions` is intentionally NOT listed: it is vendored
# in `.claude-plugin/scripts/_vendor/typing_extensions/`.

[tools]
uv       = "0.9.26"
just     = "1.36.0"
lefthook = "1.13.6"
