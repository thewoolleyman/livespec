# livespec local CI runner — hardened rootless container defaults.
# Phase 0 containment (plan/fabro-ci-image-factoring/phase0-runner-containment-design.md).
# Host-loopback services (multi-tenant Dolt :3307, OTel :4317, etc.) are already
# unreachable from a default rootless container (pasta/netavark forward external
# traffic but block host loopback + the host's own IP — verified 2026-07-12).
[containers]
netns = "private"
no_hosts = false
# Resolve names via public DNS directly — the rootless aardvark-dns path does not
# forward reliably, and the host resolver (127.0.0.53) is intentionally unreachable
# from the container. Public resolvers are reachable via NAT (1.1.1.1:443 verified).
dns_servers = ["1.1.1.1", "8.8.8.8"]

[network]
default_rootless_network_cmd = "pasta"
